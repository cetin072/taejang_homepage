name: Phase 1A Supabase Integration

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/phase1a-supabase-integration.yml"
      - "supabase/**"
      - "staff/**"
      - "app/**"
      - "admin/index.html"
      - "assets/css/styles.css"
      - "index.html"
      - "tests/phase1a-auth-integration.mjs"
      - "tests/today-board-auth-integration.mjs"
      - "tests/phase1a-security-foundation.test.js"
      - "tests/staff-entry-routing.test.js"
      - "tests/general-worker-today-board.test.js"
      - "tests/staff-schedules-notices.test.js"
      - "tests/staff-schedules-notices-auth-integration.mjs"
      - "tests/frequent-staff-guidance.test.js"
      - "tests/frequent-staff-guidance-auth-integration.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase1a-supabase-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Migration, pgTAP, Auth and RLS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Run static security checks
        run: node --test tests/phase1a-security-foundation.test.js tests/staff-entry-routing.test.js tests/general-worker-today-board.test.js tests/staff-schedules-notices.test.js tests/frequent-staff-guidance.test.js

      - name: Start isolated local Supabase
        run: supabase start

      - name: Reapply migrations from a clean database
        run: supabase db reset

      - name: Lint database schema
        run: supabase db lint --level error

      - name: Run pgTAP security tests
        run: supabase test db supabase/tests/database/*.test.sql

      - name: Run real Auth and Data API integration
        shell: bash
        run: |
          supabase status -o env > /tmp/taejang-supabase.env
          set -a
          source /tmp/taejang-supabase.env
          set +a
          SUPABASE_PROJECT_ID=taejang-homepage-phase1a node tests/phase1a-auth-integration.mjs
          SUPABASE_PROJECT_ID=taejang-homepage-phase1a node tests/today-board-auth-integration.mjs
          SUPABASE_PROJECT_ID=taejang-homepage-phase1a node tests/staff-schedules-notices-auth-integration.mjs
          SUPABASE_PROJECT_ID=taejang-homepage-phase1a node tests/frequent-staff-guidance-auth-integration.mjs

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
