<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>홈페이지 글 작성 · 태장 관리자</title>
    <link rel="stylesheet" href="assets/admin.css">
  </head>
  <body data-page="create">
    <div class="prototype-banner">정적 프로토타입 · 임시저장은 이 브라우저에만 남습니다</div>
    <header class="admin-header">
      <a class="brand" href="index.html">태장 <span>콘텐츠 운영</span>
    </a>
    <nav>
      <a href="content-list.html">콘텐츠 목록</a>
      <a class="quiet" href="../index.html">공개 홈페이지</a>
    </nav>
  </header>
  <main class="shell narrow">
    <div class="page-title">
      <div>
        <p class="eyebrow">홈페이지 자체 게시물</p>
        <h1>새 글 작성</h1>
        <p>공지·소식·행사·채용 등 홈페이지에서 전체 내용을 보여주는 글입니다.</p>
      </div>
      <span class="save-state" id="save-state">저장됨</span>
    </div>
    <form id="post-form" class="editor-form">
      <section class="panel form-section">
        <h2>기본 정보</h2>
        <div class="form-grid">
          <label>게시판 <select name="board" required>
            <option value="">선택하세요</option>
            <option>공지사항</option>
            <option>태장소식</option>
            <option>행사·포스터</option>
            <option>채용공고</option>
            <option>보도자료</option>
          </select>
        </label>
        <label>공개 상태 <select name="visibility">
          <option>작성 중</option>
          <option>게시 요청</option>
          <option>숨김</option>
        </select>
      </label>
      <label class="full">제목 <input name="title" required placeholder="게시물 제목을 입력하세요">
    </label>
    <label class="full">요약문 <textarea name="summary" rows="2" placeholder="목록 카드에 표시할 1~2줄 요약">
    </textarea>
  </label>
</div>
</section>
<section class="panel form-section">
  <div class="section-inline">
    <h2>본문</h2>
    <span class="helper">실제 편집기가 연결되기 전의 도구 모형입니다.</span>
  </div>
  <div class="toolbar" aria-label="서식 도구">
    <button type="button">제목</button>
    <button type="button">
      <b>굵게</b>
    </button>
    <button type="button">
      <u>밑줄</u>
    </button>
    <button type="button">• 목록</button>
    <button type="button">1. 목록</button>
    <button type="button">링크</button>
    <button type="button">사진</button>
    <button type="button">표</button>
    <button type="button">인용</button>
    <button type="button">구분선</button>
    <button type="button">↶</button>
    <button type="button">↷</button>
  </div>
  <textarea name="body" class="body-editor" required placeholder="본문을 입력하세요. 사진과 문단을 배치할 수 있습니다.">
  </textarea>
  <p class="helper">대표 이미지와 본문 이미지는 실제 업로드 대신 샘플 미리보기로 표현합니다.</p>
</section>
<section class="panel form-section">
  <h2>이미지·첨부</h2>
  <div class="upload-grid">
    <label class="upload-box">대표 이미지<input type="file" accept="image/*">
    <span>＋ 이미지 선택</span>
  </label>
  <label class="upload-box">본문 이미지<input type="file" accept="image/*" multiple>
  <span>＋ 이미지 여러 장</span>
</label>
<label class="upload-box">첨부파일<input type="file" multiple>
<span>＋ PDF·문서 추가</span>
</label>
</div>
</section>
<section class="panel form-section event-fields" id="event-fields" hidden>
  <h2>행사·포스터 정보</h2>
  <div class="form-grid">
    <label>행사명<input name="eventName">
  </label>
  <label>일시<input name="eventDate" type="datetime-local">
</label>
<label>장소<input name="eventPlace">
</label>
<label>문의처<input name="eventContact" placeholder="공개 가능한 연락처">
</label>
<label>신청 링크<input type="url" name="eventLink" placeholder="https://">
</label>
<label>게시 종료일<input type="date" name="eventEnd">
</label>
</div>
</section>
<div class="form-actions">
  <a class="button secondary" href="content-list.html">취소</a>
  <button class="button secondary" type="button" id="save-draft">임시저장</button>
  <a class="button secondary" href="preview.html?type=post">미리보기</a>
  <button class="button" type="submit">게시 요청</button>
</div>
</form>
</main>
<script src="assets/admin.js">
</script>
</body>
</html>
